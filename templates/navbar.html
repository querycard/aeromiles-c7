
<style>
    /* Wrapper khusus agar form ada di tengah dan tidak menabrak navbar */
    .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
        min-height: 80vh;
        background-color: #f4f7f6;
    }
    
    .auth-container {
        background-color: white;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.08);
        width: 100%;
        max-width: 550px;
        font-family: Arial, sans-serif;
    }
    
    .auth-container h2 { text-align: center; color: #333; margin-bottom: 25px; font-size: 24px; }
    
    .tabs { display: flex; justify-content: space-between; margin-bottom: 25px; border-bottom: 2px solid #eaeaea; }
    
    .tab-btn { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; font-size: 16px; font-weight: bold; color: #999; transition: color 0.3s; }
    .tab-btn:hover { color: #0056b3; }
    .tab-btn.active { color: #0056b3; border-bottom: 3px solid #0056b3; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; color: #444; }
    
    .form-group input, .form-group select { 
        width: 100%; 
        padding: 12px; 
        border: 1px solid #ccc; 
        border-radius: 6px; 
        box-sizing: border-box; 
        font-size: 14px;
        transition: border-color 0.3s;
    }
    .form-group input:focus, .form-group select:focus { 
        border-color: #0056b3; 
        outline: none; 
        box-shadow: 0 0 5px rgba(0, 86, 179, 0.15); 
    }
    
    button.submit-btn { 
        width: 100%; 
        padding: 14px; 
        background-color: #0056b3; 
        color: white; 
        border: none; 
        border-radius: 6px; 
        font-size: 16px; 
        font-weight: bold; 
        cursor: pointer; 
        margin-top: 10px;
        transition: background-color 0.3s; 
    }
    button.submit-btn:hover { background-color: #004494; }
    
    .hidden { display: none !important; }
    
    .flex-row { display: flex; gap: 15px; }
    .flex-row > div { flex: 1; }
</style>

<div class="auth-wrapper">
    <div class="auth-container">
        <div class="tabs">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
        </div>

        <div id="form-login">
            <h2>Masuk ke AeroMiles</h2>
            <form method="POST" action="{% url 'authUser:login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="button" class="submit-btn" onclick="alert('Login disimulasikan! Redirect ke Dashboard...')">Log In</button>
            </form>
        </div>

        <div id="form-register" class="hidden">
            <h2>Daftar Akun Baru</h2>
            <form method="POST" action="{% url 'authUser:login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label>Pilih Role</label>
                    <select id="role-select" name="role" onchange="toggleStafFields()">
                        <option value="Member">Member</option>
                        <option value="Staf">Staf</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Salutation</label>
                    <select name="salutation" required>
                        <option value="">Pilih...</option>
                        <option value="Mr.">Mr.</option>
                        <option value="Mrs.">Mrs.</option>
                        <option value="Ms.">Ms.</option>
                        <option value="Dr.">Dr.</option>
                    </select>
                </div>

                <div class="flex-row">
                    <div class="form-group">
                        <label>Nama Depan-Tengah</label>
                        <input type="text" name="first_mid_name" required>
                    </div>
                    <div class="form-group">
                        <label>Nama Belakang</label>
                        <input type="text" name="last_name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="reg_email" required>
                </div>

                <div class="flex-row">
                    <div class="form-group" style="flex: 0.4;">
                        <label>Kode Negara</label>
                        <input type="text" name="country_code" placeholder="+62" required>
                    </div>
                    <div class="form-group">
                        <label>Nomor HP</label>
                        <input type="text" name="mobile_number" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Tanggal Lahir</label>
                    <input type="date" name="tanggal_lahir" required>
                </div>

                <div class="form-group">
                    <label>Kewarganegaraan</label>
                    <input type="text" name="kewarganegaraan" required>
                </div>

                <div class="form-group hidden" id="staf-maskapai-group">
                    <label>Kode Maskapai</label>
                    <select name="kode_maskapai" id="reg-maskapai">
                        <option value="">Pilih Maskapai...</option>
                        <option value="GA">Garuda Indonesia (GA)</option>
                        <option value="AK">AirAsia (AK)</option>
                        <option value="JT">Lion Air (JT)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" name="password" required>
                </div>

                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <input type="password" id="reg-confirm-password" required>
                </div>

                <button type="button" class="submit-btn" onclick="validateRegister()">Register</button>
            </form>
        </div>
    </div>
</div>

<script>
    function switchTab(tab) {
        if (tab === 'login') {
            document.getElementById('form-login').classList.remove('hidden');
            document.getElementById('form-register').classList.add('hidden');
            document.getElementById('tab-login').classList.add('active');
            document.getElementById('tab-register').classList.remove('active');
        } else {
            document.getElementById('form-login').classList.add('hidden');
            document.getElementById('form-register').classList.remove('hidden');
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('tab-register').classList.add('active');
        }
    }

    function toggleStafFields() {
        const role = document.getElementById('role-select').value;
        const maskapaiGroup = document.getElementById('staf-maskapai-group');
        const maskapaiInput = document.getElementById('reg-maskapai');
        
        if (role === 'Staf') {
            maskapaiGroup.classList.remove('hidden');
            maskapaiInput.required = true;
        } else {
            maskapaiGroup.classList.add('hidden');
            maskapaiInput.required = false;
        }
    }

    function validateRegister() {
        const pass = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-confirm-password').value;
        
        if (pass !== confirm) {
            alert("Error: Password dan Konfirmasi Password harus sama!");
        } else {
            alert("Simulasi: Registrasi berhasil! Silakan login.");
            switchTab('login');
        }
    }
</script>
