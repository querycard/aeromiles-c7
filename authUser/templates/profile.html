{% extends 'base.html' %}
{% block title %}Pengaturan Profil{% endblock %}

{% block content %}
    <h2>Pengaturan Profil</h2>
    <form method="POST" action="">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ user.email }}" readonly>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>Salutation</label>
                <select name="salutation" required>
                    <option value="Mr." {% if user.salutation == 'Mr.' %}selected{% endif %}>Mr.</option>
                    <option value="Mrs." {% if user.salutation == 'Mrs.' %}selected{% endif %}>Mrs.</option>
                    <option value="Ms." {% if user.salutation == 'Ms.' %}selected{% endif %}>Ms.</option>
                    <option value="Dr." {% if user.salutation == 'Dr.' %}selected{% endif %}>Dr.</option>
                </select>
            </div>
            <div class="form-group" style="flex: 2;">
                <label>Nama Depan-Tengah</label>
                <input type="text" name="first_mid_name" value="{{ user.first_mid_name }}" required>
            </div>
            <div class="form-group" style="flex: 2;">
                <label>Nama Belakang</label>
                <input type="text" name="last_name" value="{{ user.last_name }}" required>
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>Country Code</label>
                <input type="text" name="country_code" value="{{ user.country_code }}" required>
            </div>
            <div class="form-group" style="flex: 3;">
                <label>Nomor HP</label>
                <input type="text" name="mobile_number" value="{{ user.mobile_number }}" required>
            </div>
        </div>

        <div class="form-group">
            <label>Kewarganegaraan</label>
            <input type="text" name="kewarganegaraan" value="{{ user.kewarganegaraan }}" required>
        </div>

        <div class="form-group">
            <label>Tanggal Lahir</label>
            <input type="date" name="tanggal_lahir" value="{{ user.tanggal_lahir|date:'Y-m-d' }}" required>
        </div>

        {% if user.role == 'Member' %}
            <hr>
            <h3>Data Akun Member (Tidak dapat diubah)</h3>
            <div class="form-group">
                <label>Nomor Member</label>
                <input type="text" value="{{ user.nomor_member }}" readonly>
            </div>
            <div class="form-group">
                <label>Tanggal Bergabung</label>
                <input type="text" value="{{ user.tanggal_bergabung|date:'Y-m-d' }}" readonly>
            </div>
        
        {% elif user.role == 'Staf' %}
            <hr>
            <h3>Data Akun Staf</h3>
            <div class="form-group">
                <label>ID Staf (Tidak dapat diubah)</label>
                <input type="text" value="{{ user.id_staf }}" readonly>
            </div>
            <div class="form-group">
                <label>Kode Maskapai</label>
                <select name="kode_maskapai">
                    <option value="GA" {% if user.kode_maskapai == 'GA' %}selected{% endif %}>Garuda Indonesia (GA)</option>
                    <option value="AK" {% if user.kode_maskapai == 'AK' %}selected{% endif %}>AirAsia (AK)</option>
                    <option value="SJ" {% if user.kode_maskapai == 'SJ' %}selected{% endif %}>Sriwijaya Air (SJ)</option>
                    <option value="JT" {% if user.kode_maskapai == 'JT' %}selected{% endif %}>Lion Air (JT)</option>
                    <option value="ID" {% if user.kode_maskapai == 'ID' %}selected{% endif %}>Batik Air (ID)</option>
                </select>
            </div>
        {% endif %}

        <button type="submit" class="btn-primary">Simpan Perubahan</button>
    </form>
{% endblock %}
