{% extends 'base.html' %}

{% block content %}
<style>
/* ✅ JANGAN pakai .page-wrapper lagi (itu dari base) */
.member-page {
    padding: 0 30px;
}

/* Header */
.page-header {
    margin-bottom: 20px;
}
.page-title {
    font-size: 20px;
    font-weight: 700;
    color: #0a1f44;
}

/* Controls */
.controls-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 16px;
}

.search-box input {
    padding: 9px 12px;
    width: 320px;
    border: 1px solid #d8e2f0;
    border-radius: 6px;
    font-size: 13px;
}

.btn-primary {
    background: #001f4d;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
}
.btn-primary:hover { background: #002d6b; }

/* Table */
.table-container {
    background: white;
    border-radius: 12px;
    border: 1px solid #e4ebf5;
    overflow: hidden;
}

.data-table {
    width: 100%;
    border-collapse: collapse;
}

.data-table th {
    background: #f7f9fc;
    padding: 12px 14px;
    font-size: 11.5px;
    color: #6b7fa3;
    text-transform: uppercase;
    border-bottom: 1px solid #e4ebf5;
}

.data-table td {
    padding: 13px 14px;
    font-size: 13px;
    border-bottom: 1px solid #f1f5fb;
}

.data-table tr:hover td {
    background: #f7faff;
}

/* Badge */
.tier-badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
}

.tier-gold { background: #fff4e0; color: #a06000; }
.tier-silver { background: #eef0f3; color: #454f60; }
.tier-blue { background: #e0f7ff; color: #005f80; }

/* Actions */
.action-btn {
    border: none;
    background: none;
    cursor: pointer;
    font-size: 14px;
    margin-right: 6px;
}
.action-btn:hover { color: #003380; }
.action-btn.delete:hover { color: #dc2626; }

/* Modal */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(1,15,40,.5);
    z-index: 2000;
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: white;
    border-radius: 12px;
    border: 1px solid #e4ebf5;
    width: 100%;
    max-width: 520px;
    padding: 20px;
}

.modal-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.form-row { display: flex; gap: 10px; margin-bottom: 12px; }
.form-group { flex: 1; }
.form-group label {
    font-size: 11px;
    font-weight: 600;
    color: #6b7fa3;
}
.form-group input, .form-group select {
    width: 100%;
    padding: 8px;
    border: 1px solid #d8e2f0;
    border-radius: 6px;
}

.modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 15px;
}
</style>


<div class="member-page">
    <div class="page-header">
        <div class="page-title">Kelola Member</div>
    </div>

    <div class="controls-bar">
        <div class="search-box">
            <input type="text" placeholder="Cari member...">
        </div>
        <button class="btn-primary" onclick="openModal('modalTambah')">+ Tambah</button>
    </div>

    <div class="table-container">
        <table class="data-table">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama</th>
                    <th>Email</th>
                    <th>Tier</th>
                    <th>Miles</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>M001</td>
                    <td>John Doe</td>
                    <td>john@mail.com</td>
                    <td><span class="tier-badge tier-gold">Gold</span></td>
                    <td>45,000</td>
                    <td>
                        <button class="action-btn" onclick="openModal('modalEdit')">✏️</button>
                        <button class="action-btn delete" onclick="openModal('modalHapus')">🗑️</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>


<script>
function openModal(id) {
    document.getElementById(id).style.display = 'flex';
}
function closeModal(id) {
    document.getElementById(id).style.display = 'none';
}
</script>
{% endblock %}
