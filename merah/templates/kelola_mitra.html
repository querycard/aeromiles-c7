<link href="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css)" rel="stylesheet">
<div class="container mt-5">
    <h2 class="text-danger">Kelola Mitra AeroMiles</h2>
    <hr>
    <table class="table table-hover">
        <thead class="table-info">
            <tr>
                <th>Email Mitra</th><th>ID Penyedia</th><th>Nama Mitra</th><th>Tanggal Kerjasama</th><th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            {% for m in mitra %}
            <tr>
                <td>{{ m.email }}</td><td>{{ m.id_penyedia }}</td><td>{{ m.nama }}</td><td>{{ m.sejak }}</td>
                <td>
                    <button class="btn btn-warning btn-sm">Ubah</button>
                    <button class="btn btn-danger btn-sm">Putus Kontrak</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
